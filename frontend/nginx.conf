server {
    listen 80;
    server_name localhost;
    
    # 50MB'a kadar dosya yüklemeye izin ver (WhatsApp sohbetleri büyük olabilir)
    client_max_body_size 50M;

    root /usr/share/nginx/html;
    index index.html;

    # Statik dosyaları sun ve React Router için tüm 404'leri index.html'e yönlendir
    location / {
        try_files $uri $uri/ /index.html;
    }

    # /api ile başlayan istekleri doğrudan backend konteynerine yönlendir (Proxy)
    location /api/ {
        # 'backend' kelimesi docker-compose.yml'deki servis adından gelir
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
