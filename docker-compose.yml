version: '3.8'

services:
  backend:
    build: 
      context: ./backend
    container_name: wa-backend
    restart: unless-stopped
    # Coolify üzerinden domain atayacağımız için portu siliyoruz
    # (Coolify proxy'si kendi iç ağından 8000'e otomatik yönelecek)
    volumes:
      - ./backend/data:/app/data

  frontend:
    build: 
      context: ./frontend
    container_name: wa-frontend
    restart: unless-stopped
    # Frontend de Coolify üzerinden proxy edileceği için dışarı port açmıyoruz
    # Coolify, UI üzerinden ekleyeceğiniz domaine gelen istekleri 
    # otomatik olarak bu konteynerin 80 portuna yönlendirecektir.
    depends_on:
      - backend
